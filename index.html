<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="height=device-height, initial-scale=1.0">
    <title>Snake</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <span class="score"> <span id="score"><b>0</b><span class="score-multiplayer">x 1</span></span></span><br>
        High score <span id="hs" class="highscore">36</span>

        <br>
        
        <span id="gamemode"><button id="easy" class="gamemode-button active">EASY</button> <button id="medium" class="gamemode-button">MEDIUM</button> <button id="hard" class="gamemode-button">HARD</button></span>
        <br>

        <div id="go" class="gameover-screen"><span>Click HERE or press <span class="start-small">START</span></span></div>
        <canvas id="canvas" width="380" height="380" class="game-canvas"></canvas>

        <br>

        <button id="start" class="start-button">START</button>
        <br>

        
    </div>
    <div id="htp" class="howtoplay">
            <h4>How to play?</h4>
            <div class="howtoplay-text"><span class="key">↑</span> To go up<br></div>
            <div class="howtoplay-text"><span class="key">↓</span> To go down<br></div>
            <div class="howtoplay-text"><span class="key">←</span> To go left<br></div>
            <div class="howtoplay-text"><span class="key">→</span> To go right</div>
            <br>
            <div class="howtoplay-text"><span class="food-key">ㅤ</span> Collect food</div>
            <div id="howtoplay-walls" class="howtoplay-text"><span class="wall-key">ㅤ</span> Avoid walls</div>
        </div>

    <script src="js/script.js" type="text/javascript"></script>
</body>
</html>
